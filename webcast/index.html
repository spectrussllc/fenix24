<title>Fenix24 | Cybersecurity Breach Recovery</title>

<style>
	@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
	*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
	:root {
		--flame: #bd5b31; --flame-dark: #a04926; --flame-glow: rgba(189,91,49,0.25);
		--gold: #f4c12e; --gold-dark: #d4a520; --gold-glow: rgba(244,193,46,0.3);

		--border: rgba(255,255,255,0.08); --text: #E8EAF0; --muted: #8A90A0; --white: #ffffff;
	}
	html { scroll-behavior: smooth; }
	body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.6; overflow-x: hidden; }

	/* NAV */
	nav {
		position: fixed; top: 0; left: 0; right: 0; z-index: 100;
		display: flex; align-items: center; justify-content: space-between;
		padding: 18px 60px;

	.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
	.logo-icon {

		box-shadow: 0 0 20px var(--flame-glow);
	}
	.logo-text { font-size: 22px; font-weight: 800; color: var(--white); letter-spacing: 1px; }
	.logo-text span { color: var(--flame); }
	.nav-podcast {

	/* HERO */
	.hero {

	.hero::before {

	.hero::after {

		background: linear-gradient(90deg, transparent, var(--flame), transparent);

	.eyebrow {

		background: rgba(232,75,26,0.1); border: 1px solid rgba(232,75,26,0.3);
		color: var(--flame); font-size: 12px; font-weight: 600; letter-spacing: 2px;

	.hero h1 { font-size: clamp(34px, 3.8vw, 54px); font-weight: 900; line-height: 1.1; margin-bottom: 24px; color: var(--white); }
	.hero h1 .accent { color: var(--flame); }

	.hero-ctas { display: flex; gap: 16px; flex-wrap: wrap; }

	.covers-inner { max-width: 1100px; margin: 0 auto; }
	.section-label { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--flame); margin-bottom: 14px; }

	.covers-section .sub { font-size: 16px; color: var(--muted); max-width: 680px; line-height: 1.8; margin-bottom: 48px; }

	/* ABOUT JOHN */

	/* ABOUT FENIX24 */
	.about-fenix {

		border-bottom: 1px solid var(--border);
	}
	.about-fenix-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 70px; align-items: center; }
	.about-fenix h2 { font-size: clamp(26px, 2.5vw, 40px); font-weight: 900; color: var(--white); line-height: 1.2; margin-bottom: 20px; }
	.about-fenix h2 .accent { color: var(--flame); }

	.fenix-pillars { display: flex; flex-direction: column; gap: 16px; }

	.pillar:hover { border-color: rgba(232,75,26,0.3); }

		display: flex; align-items: center; justify-content: center; font-size: 18px;
	}
	.pillar h4 { font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
	.pillar p { font-size: 13px; color: var(--muted); line-height: 1.6; }

	/* THREAT SECTION */
	.threat-section { padding: 100px 60px; background: var(--dark2); border-bottom: 1px solid var(--border); }
	.threat-section-inner { max-width: 1100px; margin: 0 auto; }
	.threat-section h2 { font-size: clamp(26px, 2.8vw, 42px); font-weight: 900; color: var(--white); line-height: 1.2; margin-bottom: 16px; }

	.threat-section .sub { font-size: 17px; color: var(--muted); line-height: 1.8; max-width: 700px; margin-bottom: 56px; }
	.threat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
	.threat-card {

		padding: 30px; position: relative; overflow: hidden;

	.threat-card:hover { border-color: rgba(232,75,26,0.4); transform: translateY(-4px); }
	.threat-card::before {
		content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
		background: linear-gradient(90deg, var(--flame), transparent); opacity: 0; transition: opacity 0.3s;
	}
	.threat-card:hover::before { opacity: 1; }
	.threat-icon {

		background: rgba(232,75,26,0.1); border: 1px solid rgba(232,75,26,0.2);

		margin-bottom: 18px; font-size: 20px;
	}
	.threat-card h3 { font-size: 17px; font-weight: 700; color: var(--white); margin-bottom: 10px; }
	.threat-card p { font-size: 14px; color: var(--muted); line-height: 1.7; }

	/* EVENTS */
	.events-section { padding: 100px 60px; background: var(--dark); border-bottom: 1px solid var(--border); }
	.events-inner { max-width: 1100px; margin: 0 auto; }
	.events-section h2 { font-size: clamp(26px, 2.8vw, 42px); font-weight: 900; color: var(--white); margin-bottom: 12px; }

	/* PODCAST ARCHIVE */
	.archive-section { padding: 100px 60px; background: var(--dark); border-bottom: 1px solid var(--border); }
	.archive-inner { max-width: 1100px; margin: 0 auto; }

	.archive-sub { font-size: 16px; color: var(--muted); line-height: 1.7; max-width: 620px; margin-bottom: 48px; }

		flex: 1; /* hide scrollbar */ -ms-overflow-style: none; scrollbar-width: none;
	}

	.ep-card {

		display: flex; flex-direction: column; gap: 12px;
	}
	.ep-title { font-size: 15px; font-weight: 700; color: var(--white); line-height: 1.3; min-height: 40px; }
	.ep-thumb {
		width: 100%; aspect-ratio: 16/9; border-radius: 8px;
		background: linear-gradient(135deg, #0d0f12 0%, #1c2130 50%, #0f1318 100%);
		border: 1px solid var(--border); position: relative; overflow: hidden;
		display: flex; align-items: center; justify-content: center; cursor: pointer;
		transition: border-color 0.2s;
	}

	}

	.ep-thumb--coming::before { background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 70%); }
	.ep-play {
		width: 52px; height: 52px; border-radius: 50%; background: var(--flame);
		display: flex; align-items: center; justify-content: center;
		box-shadow: 0 0 30px var(--flame-glow); position: relative; z-index: 1;
		transition: transform 0.2s;
	}
	.ep-thumb:hover .ep-play { transform: scale(1.1); }
	.ep-play svg { width: 22px; height: 22px; fill: white; margin-left: 3px; }
	.ep-coming-label {
		font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted);
		position: relative; z-index: 1;
	}
	.ep-num {
		position: absolute; top: 10px; left: 12px;
		font-size: 10px; font-weight: 700; letter-spacing: 2px;
		color: var(--gold); background: rgba(10,12,15,0.7);
		padding: 3px 8px; border-radius: 2px;
	}
	.ep-summary { font-size: 13px; color: var(--muted); line-height: 1.6; flex: 1; }
	.ep-cta {
		font-size: 13px; font-weight: 700; color: var(--gold);

<script>
const SHOW_PODCAST_ARCHIVE = true;
if (!SHOW_PODCAST_ARCHIVE) {
	const arch = document.getElementById('podcastArchive');
	if (arch) arch.style.display = 'none';
}
function scrollArchive(dir) {
	const track = document.getElementById('archiveTrack');
	const card = track.querySelector('.ep-card');
	track.scrollLeft += dir * (card.offsetWidth + 24);
}
function submitForm() {
	const req = ['fname','lname','firm','email'];
	let valid = true;
	req.forEach(id => {
		const el = document.getElementById(id);
		if (!el.value.trim()) {
			el.style.borderColor = '#bd5b31';
			el.style.boxShadow = '0 0 0 3px rgba(189,91,49,0.2)';
			valid = false;
		} else {
			el.style.borderColor = '';
			el.style.boxShadow = '';
		}
	});
	if (!valid) return;
	document.getElementById('contactForm').style.display = 'none';
	document.getElementById('formSuccess').style.display = 'block';
}
const obs = new IntersectionObserver(entries => {
	entries.forEach(e => {
		if (e.isIntersecting) {
			e.target.style.opacity = '0';
			e.target.style.transform = 'translateY(12px)';
			setTimeout(() => {
				e.target.style.transition = 'opacity 0.5s, transform 0.5s';
				e.target.style.opacity = '1';
				e.target.style.transform = 'translateY(0)';
			}, 100);
			obs.unobserve(e.target);
		}
	});
}, { threshold: 0.3 });
document.querySelectorAll('.stat-number, .event-card, .threat-card').forEach(el => obs.observe(el));
</script>
<script>
const redirectTarget = "https://www.brighttalk.com/webcast/21067/665010?utm_source=Fenix24&utm_medium=landingpage&utm_campaign=spectruss";
const redirectDelay = 3000;
const startValue = redirectDelay / 1000;
let countdown = startValue;
const countdownEl = document.getElementById('redirect-countdown');
if (countdownEl) {
	countdownEl.textContent = `Redirecting in ${countdown}...`;
}
const interval = setInterval(() => {
	countdown -= 1;
	if (countdownEl) {
		if (countdown > 0) {
			countdownEl.textContent = `Redirecting in ${countdown}...`;
		} else {
			countdownEl.textContent = `Redirecting now...`;
		}
	}
	if (countdown <= 0) {
		clearInterval(interval);
		window.location.href = redirectTarget;
	}
}, 1000);
</script>
